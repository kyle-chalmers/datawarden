name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — the self-scan proves the whole history is clean)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install gitleaks 8.30.1 (pinned checksum)
        run: |
          curl -sSL -o /tmp/gitleaks.tgz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tgz" | sha256sum -c -
          sudo tar -C /usr/local/bin -xzf /tmp/gitleaks.tgz gitleaks
          gitleaks version

      # Runs BEFORE any fixture generation so planted secret-shaped strings can never
      # contaminate the self-scan. A security plugin's own repo must be provably clean
      # on every push, tree and history both.
      - name: Self-scan — git history
        run: gitleaks git --no-banner --redact .

      - name: Self-scan — working tree
        run: gitleaks dir --no-banner --redact .

      - name: Baseline validation (structure, shellcheck, SQL lint, fixture checks)
        run: ./dev/validate.sh
